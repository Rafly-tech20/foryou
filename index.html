<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buket Bunga For You</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #ffdbe6 0%, #f8c2d6 45%, #e89ab7 100%);
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      width: min(94vw, 760px);
      max-width: 760px;
      background: rgba(255, 248, 250, 0.95);
      border-radius: 25px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    .slider {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      max-width: 100%;
      margin: 0 auto;
      background: #fdf4f7;
      aspect-ratio: 4 / 5;
      max-height: 70vh;
      min-height: 360px;
    }

    .slides {
      display: flex;
      transition: transform 0.5s ease;
      width: 100%;
      height: 100%;
    }

    .slide {
      min-width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 0;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 20px;
    }

    .slider-button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.8);
      color: #8e3c47;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.14);
      z-index: 2;
      opacity: 0.95;
    }

    .slider-button:hover {
      background: rgba(255, 255, 255, 1);
    }

    .slider-button.prev {
      left: 16px;
    }

    .slider-button.next {
      right: 16px;
    }

    .caption {
      margin-top: 15px;
      font-size: 18px;
      color: #5c2a34;
    }

    .signature {
      margin-top: 20px;
      font-size: 26px;
      font-weight: bold;
      color: #8e3c47;
    }

    .small-note {
      font-size: 14px;
      color: #7c4752;
    }

    .audio-player {
      margin-top: 18px;
    }

    .audio-player audio {
      width: 100%;
      border-radius: 16px;
      outline: none;
    }

    @media (max-width: 520px) {
      .card {
        width: 94vw;
      }

      .slider {
        aspect-ratio: 3 / 4;
      }

      .slider-button {
        width: 36px;
        height: 36px;
        font-size: 20px;
      }

      .caption {
        font-size: 16px;
      }

      .signature {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    
    <div class="slider">
      <div class="slides">
        <div class="slide">
          <img src="./image.jpeg" alt="Buket bunga 1" />
        </div>
        <div class="slide">
          <img src="./image1.jpeg" alt="Buket bunga 2" />
        </div>
        <div class="slide">
          <img src="./image2.jpeg" alt="Buket bunga 3" />
        </div>
      </div>
      <button class="slider-button prev" aria-label="Sebelumnya">&#10094;</button>
      <button class="slider-button next" aria-label="Berikutnya">&#10095;</button>
    </div>

    <div class="caption">
      Sebuah buket bunga yang berwarna-warni, elegan, dan hangat untuk Anda.
    </div>

    <div class="signature">For you</div>
    <div class="small-note">Putri Mei Permatasari Hasibuan</div>

    <div class="audio-player">
      <audio controls preload="auto" loop>
        <source src="./romance.mp3" type="audio/mpeg" />
        Browser Anda tidak mendukung pemutar audio.
      </audio>
    </div>

  </div>

  <script>
    const slides = document.querySelector('.slides');
    const totalSlides = document.querySelectorAll('.slide').length;
    const prevBtn = document.querySelector('.slider-button.prev');
    const nextBtn = document.querySelector('.slider-button.next');
    let currentIndex = 0;

    function updateSlider(index) {
      if (index < 0) {
        currentIndex = totalSlides - 1;
      } else if (index >= totalSlides) {
        currentIndex = 0;
      } else {
        currentIndex = index;
      }
      slides.style.transform = `translateX(-${currentIndex * 100}%)`;
    }

    prevBtn.addEventListener('click', () => updateSlider(currentIndex - 1));
    nextBtn.addEventListener('click', () => updateSlider(currentIndex + 1));
  </script>
</body>
</html>
